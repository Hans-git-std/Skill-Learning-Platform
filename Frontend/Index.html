<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCME | Domain Select</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="top-nav">
        <h1 class="logo">SCME</h1>
        <button id="theme-toggle" class="btn-retro">Toggle Theme</button>
    </nav>

    <main class="container">
        <header class="page-header">
            <h2>Select Your Domain</h2>
            <p>Deep-dive skill acquisition starts here.</p>
        </header>
<hr class="hor-line"/>
<br/>
        <section class="bento-grid">
            <a href="./domains/cs/index.html" class="bento-card card-cs">
                <img src="./assets/images/cs.png" class="bento-img">
                <div class="card-content">
                    <h3>Computer Science</h3>
                    <p>Algorithms, Full-Stack Architecture, and System Design.</p>
                </div>
            </a>
            
            <a href="./domains/mech/index.html" class="bento-card card-mech">
                <img src="./assets/images/mech.png" class="bento-img">
                <div class="card-content">
                    <h3>Mechanical Engineering</h3>
                    <p>Thermodynamics, CAD, and Material Science.</p>
                </div>
            </a>

            <a href="./domains/others/index.html" class="bento-card card-others">
                <div class="card-content">
                    <h3>Explore Others</h3>
                    <p>Cross-disciplinary skills and emerging fields.</p>
                </div>
            </a>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="core.js"></script>
</body>
</html>
